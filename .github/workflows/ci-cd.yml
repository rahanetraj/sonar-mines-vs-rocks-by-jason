name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:

  # ─────────────────────────────────────────
  # JOB 1 : Tests unitaires
  # ─────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Entraînement du modèle (requis pour les tests API)
        run: python src/train.py --stage train

      - name: Exécution des tests pytest
        run: pytest tests/ -v

  # ─────────────────────────────────────────
  # JOB 2 : Déploiement sur Render
  # ─────────────────────────────────────────
  deploy:
    name: Déploiement sur Render
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Render via webhook
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK non configuré — déploiement ignoré."
            echo "Ajouter le secret dans GitHub : Settings → Secrets → Actions"
            exit 0
          fi
          curl --fail -X POST "$RENDER_DEPLOY_HOOK"
          echo "✅ Déploiement Render déclenché."
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
